spring.application.name=distributed-job-scheduler

# Database Configurations (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Redis Caching Configurations
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

# JWT Authentication Configurations
# 256-bit Secret Key for HS256 algorithm (hex-encoded)
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
jwt.expirationMs=900000
jwt.refreshExpirationMs=604800000

# Logging Configuration
logging.level.org.springframework.security=DEBUG
logging.level.com.job.scheduler=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# WebSocket and Async Configurations
spring.mvc.async.request-timeout=60000
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Enable OpenAPI documentation path
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
